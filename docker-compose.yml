# Data plane for local dev and single-host deploy.
# Service/volume names are project-scoped (policy-*) so they don't collide with
# other compose projects on the same host.

services:
  # --- policy-db: pgvector store (vector + BM25 + metadata) -----------------
  policy-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${MDHPP_PG_DB:-mdhpp}
      POSTGRES_USER: ${MDHPP_PG_USER:-mdhpp}
      POSTGRES_PASSWORD: ${MDHPP_PG_PASSWORD:-mdhpp}
    # Schema is auto-applied from docker/postgres/*.sql on first boot only
    # (postgres runs /docker-entrypoint-initdb.d/* against an empty data dir).
    volumes:
      - policy_pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MDHPP_PG_USER:-mdhpp} -d ${MDHPP_PG_DB:-mdhpp}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  # --- policy-api: FastAPI SSE query service (wired up in Phase 3) ----------
  policy-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      MDHPP_PG_HOST: policy-db          # in-network DNS name of the db service
      MDHPP_PG_PORT: 5432
      MDHPP_PG_DB: ${MDHPP_PG_DB:-mdhpp}
      MDHPP_PG_USER: ${MDHPP_PG_USER:-mdhpp}
      MDHPP_PG_PASSWORD: ${MDHPP_PG_PASSWORD:-mdhpp}
      # Reach Ollama running on the host (Docker Desktop maps this to the host).
      MDHPP_LLM_HOST: ${MDHPP_LLM_HOST:-http://host.docker.internal:11434}
      # Model must match one pulled on the host (`ollama list`).
      MDHPP_LLM_MODEL: ${MDHPP_LLM_MODEL:-llama3.2:3b}
    # Makes host.docker.internal resolve on Linux too (automatic on Mac/Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Model + HF caches live in named volumes so weights are downloaded once
    # and never copied into the image (keeps builds fast, layers small).
    volumes:
      - policy_hf_cache:/home/app/.cache/huggingface
      - policy_model_cache:/home/app/.cache/mdhpp
    depends_on:
      policy-db:
        condition: service_healthy
    # Not published to the host directly; policy-proxy fronts it on :80.
    expose:
      - "8000"
    # Recover from transient failures instead of exiting for good.
    restart: unless-stopped
    # Reports healthy only once the app actually answers, so the proxy waits
    # for a working backend rather than a merely-started container.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthcheck')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # --- policy-web: builds the frontend and publishes it to the web volume ---
  policy-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - policy_web_dist:/usr/share/nginx/html
    # One-shot publish then idles; proxy serves the volume it populated.

  # --- policy-modelwarm: one-shot pre-download of model weights -------------
  # Run explicitly once per environment to warm the cache volumes before
  # serving traffic:  docker compose run --rm policy-modelwarm
  # Uses the same image + cache volumes as policy-api, so weights it downloads
  # are exactly what the API reads. Not started by `up` (profile-gated).
  policy-modelwarm:
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles: ["tools"]
    environment:
      HF_HOME: /home/app/.cache/huggingface
    volumes:
      - policy_hf_cache:/home/app/.cache/huggingface
      - policy_model_cache:/home/app/.cache/mdhpp
    command:
      - python
      - -c
      - |
        from mdhpp_core import load_settings, Chunk, Citation
        from mdhpp_retrieval.embed import BGEM3Embedder
        from mdhpp_retrieval.rerank import BGEReranker
        s = load_settings()
        print(f"downloading embedder {s.embedding_model}...", flush=True)
        BGEM3Embedder(s.embedding_model).embed(["warm up"])
        print(f"downloading reranker {s.reranker_model}...", flush=True)
        w = Chunk(id="w", text="w", citation=Citation(doc="w", section="w", breadcrumb="w", url=None, snippet="warm up"))
        BGEReranker(s.reranker_model).rerank("warm up", [w], top_k=1)
        print("model cache warmed.", flush=True)

  # --- policy-proxy: single-port reverse proxy (/api -> api, / -> web) ------
  policy-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - policy_web_dist:/usr/share/nginx/html:ro
      # TLS material: put fullchain.pem + privkey.pem in ./nginx/certs.
      - ./nginx/certs:/etc/nginx/certs:ro
      # ACME http-01 challenge webroot (for Let's Encrypt renewals).
      - ./nginx/certbot:/var/www/certbot
    depends_on:
      policy-api:
        condition: service_healthy
      policy-web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  policy_pgdata:
  policy_hf_cache:
  policy_model_cache:
  policy_web_dist:
