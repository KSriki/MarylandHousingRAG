site_name: MDHousingPolicyPipeline
site_description: Retrieval-grounded advisory over Maryland housing/HOA law — guidance and citations, not verdicts.
repo_url: https://github.com/KSriki/MDHousingPolicyPipeline
repo_name: KSriki/MDHousingPolicyPipeline

# Material theme — dark/light toggle, search, code copy, mermaid.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

# Plugins:
# - search:       built-in
# - mkdocstrings: Python auto-generated API reference from docstrings
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/core/src
            - packages/ingestion/src
            - packages/retrieval/src
            - packages/api/src
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            filters:
              - "!^_"             # hide private members
              - "!^model_config"  # hide pydantic ConfigDict noise

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - footnotes

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Retrieval: architecture/retrieval.md
      - Data model & dependencies: architecture/data-model.md
      - Operations: architecture/operations.md
      - Security, privacy & legal: architecture/security-legal.md
      - Decisions & alternatives: architecture/decisions.md
  - Reference:
      - CLI: reference/cli.md
      - Packages:
          - Overview: reference/packages/index.md
          - mdhpp-core: reference/packages/core.md
          - mdhpp-ingestion: reference/packages/ingestion.md
          - mdhpp-retrieval: reference/packages/retrieval.md
          - mdhpp-api: reference/packages/api.md
