name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"

jobs:
  # Fast gate: lint, type-check, unit tests. No external services.
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy packages/*/src

      - name: Unit tests
        run: uv run pytest -m unit -q

  # Integration gate: real pgvector with the init schema applied.
  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mdhpp
          POSTGRES_USER: mdhpp
          POSTGRES_PASSWORD: mdhpp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mdhpp -d mdhpp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      MDHPP_PG_HOST: localhost
      MDHPP_PG_PORT: "5432"
      MDHPP_PG_DB: mdhpp
      MDHPP_PG_USER: mdhpp
      MDHPP_PG_PASSWORD: mdhpp
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      # Service containers don't run docker-entrypoint-initdb.d hooks the way
      # `docker compose` does, so apply the schema explicitly before tests.
      - name: Apply schema
        run: |
          PGPASSWORD=mdhpp psql -h localhost -U mdhpp -d mdhpp -f docker/postgres/01_schema.sql

      - name: Integration tests
        run: uv run pytest -m integration -q