# Run: uv run pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint with autofix. --exit-non-zero-on-fix makes the commit fail the
      # first time so you review and re-stage the fixes (keeps local == CI).
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
      # Format check/apply across the workspace.
      - id: ruff-format
        name: ruff (format)
  - repo: local
    hooks:
      # Runs mypy through the synced uv workspace so it sees every dependency
      # automatically — no separate additional_dependencies list to keep in
      # sync. Identical to what `make check` and CI run.
      - id: mypy
        name: mypy (strict, via uv)
        entry: uv run mypy src packages/core/src packages/ingestion/src packages/retrieval/src packages/api/src
        language: system
        types: [python]
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        # --unsafe: syntax-check only, without constructing Python objects.
        # mkdocs.yml uses `!!python/name:...` tags (required for mermaid) that
        # the default safe loader rejects. This still catches real syntax errors.
        args: [--unsafe]
      - id: check-added-large-files
        # Guards against committing model weights, corpora, or binaries. uv
        # lockfiles are legitimately large plain text (the evals/ lock pins a
        # deep langchain tree across platforms) and MUST be committed for
        # reproducible resolution — exclude them rather than raising the limit,
        # which would weaken the guard for the files it actually exists to catch.
        args: [--maxkb=500]
        exclude: '(^|/)uv\.lock$'
