# Run: uv run pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Lint with autofix. --exit-non-zero-on-fix makes the commit fail the
      # first time so you review and re-stage the fixes (keeps local == CI).
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
      # Format check/apply across the workspace.
      - id: ruff-format
        name: ruff (format)
  - repo: local
    hooks:
      # Runs mypy through the synced uv workspace so it sees every dependency
      # automatically — no separate additional_dependencies list to keep in
      # sync. Identical to what `make check` and CI run.
      - id: mypy
        name: mypy (strict, via uv)
        entry: uv run --no-sync mypy packages/core/src packages/ingestion/src packages/retrieval/src packages/api/src
        language: system
        types: [python]
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
