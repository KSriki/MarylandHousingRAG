# Single-port reverse proxy: /api -> FastAPI (policy-api), / -> built frontend.
# SSE requires buffering off and a long read timeout so token streams flow
# through unbuffered and long-lived connections aren't cut.
#
# The upstream is resolved LAZILY (variable + Docker's embedded DNS resolver)
# so nginx starts even when policy-api is down/booting, instead of aborting at
# startup with "host not found in upstream". A booting backend yields a clean
# 502 for /api until it's ready, rather than crashing the whole proxy.

server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. `valid=10s` re-resolves as containers come/go.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Static frontend (built React/shadcn assets, mounted read-only).
    root /usr/share/nginx/html;
    index index.html;

    # API + SSE. Everything under /api proxies to FastAPI.
    location /api/ {
        # Host in a variable => nginx resolves at request time, not at boot.
        set $policy_api "http://policy-api:8000";
        proxy_pass $policy_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE essentials ---
        proxy_buffering    off;           # stream tokens through immediately
        proxy_cache        off;
        proxy_set_header   Connection "";  # keep upstream connection alive
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;         # don't cut a long-lived stream
        proxy_send_timeout 3600s;
    }

    # SPA fallback: unknown routes serve index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening.
    server_tokens off;
    client_max_body_size 2m;
}
