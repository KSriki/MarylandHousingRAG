# Single-port reverse proxy with TLS at the public edge.
#   :80  -> redirect to HTTPS
#   :443 -> serve frontend + proxy /api to FastAPI (over the private docker net)
#
# Internal hops (nginx -> policy-api, api -> db/ollama) stay HTTP on the private
# docker network, which is the trust boundary for a single-node deploy. TLS is
# terminated here at the edge, where traffic actually crosses the public network.
#
# The upstream is resolved LAZILY (variable + Docker's embedded DNS resolver) so
# nginx starts even when policy-api is booting.

# --- HTTP :80 -> permanent redirect to HTTPS ---
server {
    listen 80;
    server_name _;
    # ACME http-01 challenge path stays on HTTP for cert issuance/renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 ---
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Cert + key mounted into the container (see docker-compose volumes).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern, reasonable TLS defaults.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # API + SSE.
    location /api/ {
        set $policy_api "http://policy-api:8000";
        proxy_pass $policy_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE essentials ---
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection "";
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
    client_max_body_size 2m;
}
