# Single-port reverse proxy: /api -> FastAPI backend, / -> built frontend.
# SSE requires buffering off and a long read timeout so token streams flow
# through unbuffered and long-lived connections aren't cut.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Static frontend (built React/shadcn assets, mounted read-only).
    root /usr/share/nginx/html;
    index index.html;

    # API + SSE. Everything under /api proxies to FastAPI.
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE essentials ---
        proxy_buffering    off;           # stream tokens through immediately
        proxy_cache        off;
        proxy_set_header   Connection "";  # keep upstream connection alive
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;         # don't cut a long-lived stream
        proxy_send_timeout 3600s;
    }

    # SPA fallback: unknown routes serve index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening.
    server_tokens off;
    client_max_body_size 2m;
}