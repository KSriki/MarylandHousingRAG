[project]
name = "mdhpp-ingestion"
version = "0.1.0"
description = "Offline pipeline: parse -> section-aware chunk -> embed -> upsert to pgvector."
requires-python = ">=3.12"
dependencies = [
    "mdhpp-core",
    "psycopg[binary]>=3.2.0",
    "pgvector>=0.3.0",
    "pypdf>=5.0.0",
    "trafilatura>=1.12.0",
    "tiktoken>=0.8.0",
]

[project.scripts]
ingest = "mdhpp_ingestion.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mdhpp_ingestion"]
