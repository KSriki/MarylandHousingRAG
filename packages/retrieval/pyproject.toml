[project]
name = "mdhpp-retrieval"
version = "0.1.0"
description = "Hybrid retrieve (vector + BM25) + cross-encoder rerank + grounded prompt assembly."
requires-python = ">=3.12"
dependencies = [
    "mdhpp-core",
    "psycopg[binary]>=3.2.0",
    "pgvector>=0.3.0",
    "rank-bm25>=0.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mdhpp_retrieval"]
