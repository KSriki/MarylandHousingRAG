[project]
name = "mdhpp-retrieval"
version = "0.1.0"
description = "Hybrid retrieve (vector + BM25) + cross-encoder rerank + grounded prompt assembly."
requires-python = ">=3.12"
dependencies = [
    "mdhpp-core",
    "psycopg[binary]>=3.2.0",
    "pgvector>=0.3.0",
    "FlagEmbedding>=1.2",
    # FlagEmbedding 1.4 uses the pre-5.x tokenizer API (prepare_for_model on the
    # slow tokenizer), which transformers 5.x removed — causing
    # "XLMRobertaTokenizer has no attribute prepare_for_model" in the reranker.
    # Pin to the 4.x line until FlagEmbedding supports transformers 5.
    "transformers>=4.40,<5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mdhpp_retrieval"]
