[project]
name = "mdhpp-api"
version = "0.1.0"
description = "FastAPI app: SSE /ask endpoint, grounding prompt, disclaimer injection, rate limiting."
requires-python = ">=3.12"
dependencies = [
    "mdhpp-core",
    "mdhpp-retrieval",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "sse-starlette>=2.1.0",
    "structlog>=24.4.0",
]

[project.scripts]
serve = "mdhpp_api.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mdhpp_api"]
