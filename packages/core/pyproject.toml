[project]
name = "mdhpp-core"
version = "0.1.0"
description = "Shared pydantic models, settings, and the embedder/reranker port. No I/O."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mdhpp_core"]
